<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>TheGrandChess9 • Smart AI (Multi-Difficulty)</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
/* ------------------------------
    FIXED CSS (Board Dikhega Bina Break Kiye)
    ------------------------------ */
.pieces-info { max-width: 800px; margin: 10px auto; text-align: center; }
.pieces-row { display: flex; justify-content: space-around; align-items: center; margin-bottom: 15px; flex-wrap: nowrap; }
.white-row .piece-item { background: #eef6ff; }
.black-row .piece-item { background: #ffeede; }
.piece-item { display: flex; flex-direction: column; align-items: center; width: 70px; padding: 10px; border-radius: 12px; box-shadow: 0 2px 3px rgba(0,0,0,0.15); transition: 0.10s; }
.piece-item img { width: 55px; height: 55px; margin-bottom: 4px; }
.piece-item span { font-size: 10px; font-weight: bold; }
.piece-item:hover { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.25); }

:root{ var(--bg):#708c51; var(--panel):#f7f7f7; var(--border):#999; var(--shadow):rgba(0,0,0,0.25); var(--light):#f0d9b5; var(--dark):#63aab5; var(--accent):#2d9cdb; var(--accent-2):#2ecc71; }
*{box-sizing:border-box}

body{ 
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
    font-size:15px; 
    background:#708c51;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start; 
    min-height:100vh;
    padding:12px;
}

/* ⭐ CLEAN LOGO TOP */
.header{ 
    text-align:center;
    font-size:1.6rem;
    font-weight:700;
    margin-bottom:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.25);
}
.header img{
    height:42px;
    width: auto;
    background: transparent;
    border: none;
    box-shadow: none;
}

.options, .controls{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:10px;}
button{background:#f7f7f7;border:1px solid #999;border-radius:8px;padding:8px 14px;font-size:0.95em;cursor:pointer;transition:0.12s;user-select:none;}
button:hover{transform:translateY(-1px);box-shadow:0 6px 12px rgba(0,0,0,0.06);}
button.active{background:linear-gradient(180deg,#f8fcff,#8C9399);border-color:#2d9cdb;box-shadow:0 6px 18px rgba(45,156,219,0.12);}
.mode-status{text-align:center;font-size:13px;color:#fff;margin-bottom:6px;min-height:18px;font-weight: 600;}

/* Board Container */
.board-container{
    background:#4d453f;
    padding: 10px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.25);
    margin-bottom:12px;
    border:3px solid white;
    max-width: 820px;
    width: 100%;
}

/* Left Board Grid */
.left-board{
    display:grid;
    grid-template-columns: 30px 1fr;
    grid-template-rows: auto 30px; 
    gap: 5px;
    width: 100%;
}

.rank-labels{
    grid-column:1;
    grid-row:1;
    display:flex;
    flex-direction:column;
    height: 100%;
}
.rank-label{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 16px;
    color:#fff;
    font-weight:700;
    background:transparent;
}

.board-wrap{
    grid-column:2;
    grid-row:1;
    display:flex;
    justify-content:center;
    align-items:center;
    width: 100%;
}

/* Chessboard */
.chessboard{
    display:grid;
    grid-template-columns: repeat(9, 1fr);
    grid-template-rows: repeat(9, 1fr);
    width: 100%;
    height: auto; 
    aspect-ratio: 1 / 1;
    margin: 0;
    background:transparent;
    border-radius:4px;
    overflow:hidden;
    gap: 3px;
}

/* Squares */
.square{
    width: 100%;
    height: 100%;
    display:flex;
    align-items:center;
    justify-content:center;
    box-sizing:border-box;
    cursor:pointer;
}
.square.light{background:#f5edd7;}
.square.dark{background:#b58863;}
.square.selected{outline:3px solid rgba(52,152,219,0.95);}
.square.highlight{outline:3px solid rgba(46,204,113,0.95);}
.square.c-choose{outline:8px solid #e67e22;box-shadow:0 0 0 4px #ffe9c1;}
.square.last-move{box-shadow: inset 0 0 0 3px rgba(0,0,0,0.06);}

/* Pieces */
img.piece{
    width: 90%;
    height: 90%;
    user-select:none;
    pointer-events:none;
}

.file-labels{
    grid-column:2;
    grid-row:2;
    display:flex;
    flex-direction:row;
    width: 100%;
}
.file-label{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 16px;
    color:#fff;
    font-weight:700;
}

.game-info{background:#f7f7f7;padding:12px;border-radius:8px;text-align:left;box-shadow:0 2px 6px rgba(0,0,0,0.25);font-size:15px;color:#222;max-width:820px;width:100%;}
.game-info .head{font-size:18px;font-weight:800;margin-bottom:10px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start;}
.info-grid .box{background:white;padding:8px;border-radius:6px;border:1px solid #eee;font-weight:700;text-align:center;}
.status{margin:10px 0;padding:10px;font-weight:700;font-size:15px;text-align:center;border-radius:7px;}
.status.check{background:#ffe7b3;color:#bb6702;}
.status.mate{background:#ffc3c3;color:#d0002a;}
.status.stale{background:#dbf3ff;color:#226edc;}
.status.cmsg{background:#e7f6ff;color:#186dd6;}
.moves{height:100px;overflow:auto;background:white;border-radius:8px;padding:8px;font-family:monospace;margin-top:8px;}
.footer{font-size:13px;color:#666;margin-top:12px;}

.modal{position:fixed;left:0;top:0;right:0;bottom:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.35);z-index:999;}
.modal-card{background:#fff;padding:14px;border-radius:10px;display:flex;align-items:center;gap:12px;box-shadow:0 10px 30px rgba(0,0,0,0.2);}
.promo-piece{cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:6px;border-radius:6px;}
.promo-piece img{width:54px;height:54px;}

@media (max-width: 860px){
    .left-board {
        grid-template-columns: 20px 1fr;
        grid-template-rows: auto 20px;
        padding: 5px;
    }
    .rank-label { font-size: 12px; }
    .file-label { font-size: 12px; }
}
</style>
</head>
<body>

  <div class="header">
    <img src="img/Logo.png" alt="Logo">
    <span>TheGrandChess9</span>
    <img src="img/Logo.png" alt="Logo">
  </div>

  <div class="options" role="toolbar" aria-label="AI Difficulty Level">
    <button id="btnEasy" class="active" onclick="changeDifficulty('easy')">Beginner</button>
    <button id="btnMedium" onclick="changeDifficulty('medium')">Expert</button>
    <button id="btnHard" onclick="changeDifficulty('hard')">Genius GrandMaster</button>
  </div>

  <div class="mode-status" id="modeStatus">Difficulty: Beginner</div>

  <div class="controls">
    <button id="undoBtn" onclick="undoMove()">Undo</button>
    <button id="resetBtn" onclick="resetGame()">Reset</button>
    <button id="startBtn" onclick="startGame()">Start</button>
    <button id="flipBtn" onclick="flipBoard()">Flip Board</button>
  </div>

  <div class="board-container" id="boardContainer">
    <div class="left-board">
     <div class="rank-labels" id="rankLabels" aria-hidden="true">
        <div class="rank-label">9</div><div class="rank-label">8</div><div class="rank-label">7</div>
        <div class="rank-label">6</div><div class="rank-label">5</div><div class="rank-label">4</div>
        <div class="rank-label">3</div><div class="rank-label">2</div><div class="rank-label">1</div>
      </div>
      <div class="board-wrap">
        <div class="chessboard" id="chessboard" role="grid" aria-label="Chessboard"></div>
      </div>
     <div class="file-labels" id="fileLabels" aria-hidden="true">
        <div class="file-label">a</div><div class="file-label">b</div><div class="file-label">c</div>
        <div class="file-label">d</div><div class="file-label">e</div><div class="file-label">f</div>
        <div class="file-label">g</div><div class="file-label">h</div><div class="file-label">i</div>
      </div>
    </div>
  </div>

  <div class="game-info" id="gameInfo">
    <div class="head">Game Info / Record</div>
    <div class="info-grid">
      <div class="box">
        <div style="font-size:12px;color:#666;margin-bottom:6px">Turn</div>
        <div id="infoTurn">White</div>
      </div>
      <div class="box">
        <div style="font-size:12px;color:#666;margin-bottom:6px">Halfmove</div>
        <div id="infoHalfmove">0</div>
      </div>
    </div>

    <div style="margin-top:8px;">
      <div style="font-size:12px;color:#666;margin-bottom:6px">Pawn Placement Phase</div>
      <div id="infoPawnPlace" class="box" style="background:#fff;margin-top:0;padding:10px;">White's Pawn Setup</div>
    </div>

    <div id="status" class="status" style="margin-top:10px;"></div>
    <div class="moves" id="movesContainer"><ol id="movesList" style="margin:0;padding-left:18px;"></ol></div>
    <div class="footer"> " Match Active " </div>
  </div>

  <div id="promoModal" class="modal" style="display:none;">
    <div class="modal-card" id="promoCard">
      <div style="font-weight:700;margin-right:8px;">Promote to:</div>
      <span class="promo-piece" onclick="selectPromotion('q')"><img src="img/wq.png" alt="Q"></span>
      <span class="promo-piece" onclick="selectPromotion('r')"><img src="img/wr.png" alt="R"></span>
      <span class="promo-piece" onclick="selectPromotion('b')"><img src="img/wb.png" alt="B"></span>
      <span class="promo-piece" onclick="selectPromotion('n')"><img src="img/wn.png" alt="N"></span>
    </div>
  </div>

<script>
/* ------------------------------
    Core Game Execution Engine Logic
    ------------------------------ */
const BOARD_SIZE = 9;
const boardEl = document.getElementById('chessboard');
const statusEl = document.getElementById('status');
const movesListEl = document.getElementById('movesList');
const promoModal = document.getElementById('promoModal');
const infoTurn = document.getElementById('infoTurn');
const infoHalfmove = document.getElementById('infoHalfmove');
const infoPawnPlace = document.getElementById('infoPawnPlace');
const modeStatus = document.getElementById('modeStatus');

const PIECE_IMG = {
  w: { p:'wp.png', r:'wr.png', n:'wn.png', b:'wb.png', q:'wq.png', k:'wk.png', s:'ws.png', c:'wc.png' },
  b: { p:'bp.png', r:'br.png', n:'bn.png', b:'bb.png', q:'bq.png', k:'bk.png', s:'bs.png', c:'bc.png' }
};

let board = null;
let turn = 'w';
let flipped = false;
let selected = null;
let legalMovesCache = [];
let moveHistory = [];
let lastMove = null;
let halfmoveClock = 0;
let fullmoveNumber = 1;

let pawnChoosePhase = true;
let pawnChooseColor = 'w';
let pawnChooseCount = 0;

let forcingCharioteerPhase = false;
let kingColorNeedingC = null;
let aiEnabled = true; 
let aiColor = 'b';
let currentDifficulty = 'easy'; // Default: Beginner

const PIECE_VALUES = {p:100, n:300, b:250, r:500, q:1000, k:20000, c:350, s:1800};

function changeDifficulty(level) {
  currentDifficulty = level;
  document.getElementById('btnEasy').classList.remove('active');
  document.getElementById('btnMedium').classList.remove('active');
  document.getElementById('btnHard').classList.remove('active');

  if(level === 'easy') {
    document.getElementById('btnEasy').classList.add('active');
    modeStatus.textContent = "Difficulty: Beginner";
  } else if(level === 'medium') {
    document.getElementById('btnMedium').classList.add('active');
    modeStatus.textContent = "Difficulty: Expert";
  } else if(level === 'hard') {
    document.getElementById('btnHard').classList.add('active');
    modeStatus.textContent = "Difficulty: Genius GrandMaster";
  }
}

function initialBoard(){
  return [
    [ {t:'r',c:'b'},{t:'b',c:'b'},{t:'n',c:'b'},{t:'s',c:'b'},{t:'k',c:'b'},{t:'q',c:'b'},{t:'b',c:'b'},{t:'n',c:'b'},{t:'r',c:'b'} ],
    [ {t:'p',c:'b'},{t:'p',c:'b'},{t:'p',c:'b'},{t:'p',c:'b'},{t:'c',c:'b'},{t:'p',c:'b'},{t:'p',c:'b'},{t:'p',c:'b'},{t:'p',c:'b'} ],
    new Array(BOARD_SIZE).fill(null),
    new Array(BOARD_SIZE).fill(null),
    new Array(BOARD_SIZE).fill(null),
    new Array(BOARD_SIZE).fill(null),
    new Array(BOARD_SIZE).fill(null),
    [ {t:'p',c:'w'},{t:'p',c:'w'},{t:'p',c:'w'},{t:'p',c:'w'},{t:'c',c:'w'},{t:'p',c:'w'},{t:'p',c:'w'},{t:'p',c:'w'},{t:'p',c:'w'} ],
    [ {t:'r',c:'w'},{t:'n',c:'w'},{t:'b',c:'w'},{t:'q',c:'w'},{t:'k',c:'w'},{t:'s',c:'w'},{t:'n',c:'w'},{t:'b',c:'w'},{t:'r',c:'w'} ],
  ];
}

function render(){
  boardEl.innerHTML = '';
  let cHighlight = [];
  if(forcingCharioteerPhase && findKing(kingColorNeedingC)){
    const king = findKing(kingColorNeedingC);
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
      if(dr===0&&dc===0) continue;
      const tr = king[0]+dr, tc = king[1]+dc;
      if(inside(tr,tc) && board[tr][tc]===null) cHighlight.push([tr,tc]);
    }
  }

  for(let r=0; r<BOARD_SIZE; r++){
    for(let c=0; c<BOARD_SIZE; c++){
      const displayR = flipped ? BOARD_SIZE-1-r : r;
      const displayC = flipped ? BOARD_SIZE-1-c : c;
      const sq = document.createElement('div');
      sq.className = 'square ' + (((r+c)%2===0) ? 'light' : 'dark');
      sq.dataset.r = r; sq.dataset.c = c;

      const p = board[displayR][displayC];
      if(p){
        const img = document.createElement('img');
        img.className = 'piece';
        img.src = 'img/' + PIECE_IMG[p.c][p.t];
        sq.appendChild(img);
      }

      if(lastMove){
        const lf = lastMove.from, lt = lastMove.to;
        if((lf[0]===r && lf[1]===c) || (lt[0]===r && lt[1]===c)) sq.classList.add('last-move');
      }

      if(forcingCharioteerPhase && cHighlight.some(([tr,tc])=>tr===r&&tc===c)){
        sq.classList.add('c-choose');
      }

      sq.onclick = ()=> onSquareClick(displayR,displayC);
      boardEl.appendChild(sq);
    }
  }
  updateInfoPanel();
  setStatusBar();
  renderMoves();
  updateBoardLabels();   
}

function updateBoardLabels(){
  const rankContainer = document.getElementById('rankLabels');
  const fileContainer = document.getElementById('fileLabels');
  rankContainer.innerHTML = ''; fileContainer.innerHTML = '';
  const ranks = flipped ? [1,2,3,4,5,6,7,8,9] : [9,8,7,6,5,4,3,2,1];
  const files = flipped ? ['i','h','g','f','e','d','c','b','a'] : ['a','b','c','d','e','f','g','h','i'];

  ranks.forEach(r=>{
    const div = document.createElement('div'); div.className = 'rank-label'; div.textContent = r;
    rankContainer.appendChild(div);
  });
  files.forEach(f=>{
    const div = document.createElement('div'); div.className = 'file-label'; div.textContent = f;
    fileContainer.appendChild(div);
  });
}

function updateInfoPanel(){
  infoTurn.textContent = turn==='w' ? 'White' : 'Black';
  infoHalfmove.textContent = halfmoveClock;
  infoPawnPlace.textContent = pawnChoosePhase ? (pawnChooseColor==='w' ? "White's Pawn" : "Black's Pawn") : '—';
}

function onSquareClick(r,c){
  if(forcingCharioteerPhase){
    if(turn === aiColor) return;
    let king = findKing(kingColorNeedingC);
    if(inside(r,c) && board[r][c]===null && Math.abs(r-king[0])<=1 && Math.abs(c-king[1])<=1){
      const cpos = findCharioteer(kingColorNeedingC);
      if(cpos){
        board[r][c] = {...board[cpos[0]][cpos[1]]};
        board[cpos[0]][cpos[1]] = null;
      }
      forcingCharioteerPhase=false; kingColorNeedingC=null;
      render();
      if(turn === aiColor) setTimeout(()=>maybeAIMove(), 100);
    }
    return;
  }

  if(pawnChoosePhase){
    if(turn === aiColor) return;
    const allowedRow = pawnChooseColor === 'w' ? 6 : 2;
    if(r !== allowedRow || board[r][c] !== null) return;
    board[r][c] = { t:'p', c: pawnChooseColor, special:true };
    pawnChooseCount++;
    if(pawnChooseCount < 2){ render(); return; }
    
    if(pawnChooseColor==='w'){
      pawnChooseColor = 'b'; pawnChooseCount = 0; render();
      setTimeout(()=>aiAutoPlaceTwoPawns(), 100);
    }
    return;
  }

  const piece = board[r][c];
  if(selected){
    const legal = legalMovesCache.find(m=>m.from[0]===selected[0]&&m.from[1]===selected[1]&&m.to[0]===r&&m.to[1]===c);
    if(legal){
      if(legal.special === 'promotion'){
        pendingPromotion = {...legal};
        promoModal.style.display = 'flex';
        return;
      }
      applyMove(legal);
      selected = null; legalMovesCache = [];
      if(turn === aiColor) setTimeout(()=>maybeAIMove(), 100);
      return;
    }
  }

  if(piece && piece.c === turn){
    selected = [r, c];
    legalMovesCache = generateLegalMovesForSquare(r, c);
    highlightSelection(selected, legalMovesCache);
  } else {
    selected = null; legalMovesCache = []; render();
  }
}

function aiAutoPlaceTwoPawns(){
  let count = 0;
  while(count < 2){
    let randC = Math.floor(Math.random()*9);
    if(board[2][randC] === null){
      board[2][randC] = {t:'p', c:'b', special:true};
      count++;
    }
  }
  pawnChoosePhase = false; turn = 'w'; render();
}

function highlightSelection(sel, moves){
  render();
  const sqs = boardEl.querySelectorAll('.square');
  moves.forEach(m=>{
    const tr = m.to[0], tc = m.to[1];
    const displayR = flipped ? BOARD_SIZE-1-tr : tr;
    const displayC = flipped ? BOARD_SIZE-1-tc : tc;
    const idx = displayR * 9 + displayC;
    if(sqs[idx]) sqs[idx].classList.add('highlight');
  });
}

function generateLegalMovesForSquare(r,c){
  const piece = board[r][c]; if(!piece || piece.c !== turn) return [];
  const pseudo = generatePseudoMoves(r,c); const legal = [];
  pseudo.forEach(m=>{
    const snap = snapshotState(); makeMoveOnBoard(m);
    if(!isKingInCheck(piece.c)) legal.push(m);
    restoreState(snap);
  });
  return legal;
}

function generatePseudoMoves(r,c){
  const p = board[r][c]; if(!p) return [];
  const moves = [], color = p.c, dir = color === 'w' ? -1 : 1;

  function pushMove(toR,toC,special=null){
    if(!inside(toR,toC)) return;
    const target = board[toR][toC];
    if(target && target.t === 'c') return;
    moves.push({from:[r,c],to:[toR,toC],piece:{...p},captured: target ? {...target} : null, special});
  }

  if(p.t === 'p'){
    const oneR = r + dir;
    if(inside(oneR,c) && !board[oneR][c]){
      if((color==='w' && oneR===0) || (color==='b' && oneR===8)){
        moves.push({from:[r,c],to:[oneR,c],piece:{...p},captured:null,special:'promotion'});
      } else {
        pushMove(oneR,c);
        if((color==='w' && r===7) || (color==='b' && r===1)){
          if(!board[r+2*dir][c] && !p.special) pushMove(r+2*dir,c,'double');
        }
      }
    }
    for(const dc of [-1,1]){
      if(inside(r+dir,c+dc) && board[r+dir][c+dc] && board[r+dir][c+dc].c !== color && board[r+dir][c+dc].t!=='c'){
        if((color==='w' && r+dir===0) || (color==='b' && r+dir===8)){
          moves.push({from:[r,c],to:[r+dir,c+dc],piece:{...p},captured:{...board[r+dir][c+dc]},special:'promotion'});
        } else { pushMove(r+dir,c+dc); }
      }
    }
  }
  if(p.t==='n'||p.t==='s'){
    [[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]].forEach(([dr,dc])=>{
      let tr=r+dr, tc=c+dc; if(inside(tr,tc)&&(!board[tr][tc]||board[tr][tc].c!==color)) pushMove(tr,tc);
    });
  }
  if(p.t==='b'||p.t==='q'||p.t==='s'){
    [[1,1],[1,-1],[-1,1],[-1,-1]].forEach(([dr,dc])=>{
      let tr=r+dr, tc=c+dc;
      while(inside(tr,tc)){
        if(!board[tr][tc]) pushMove(tr,tc);
        else { if(board[tr][tc].c!==color && board[tr][tc].t!=='c') pushMove(tr,tc); break; }
        tr+=dr; tc+=dc;
      }
    });
  }
  if(p.t==='r'||p.t==='q'||p.t==='s'){
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr,dc])=>{
      let tr=r+dr, tc=c+dc;
      while(inside(tr,tc)){
        if(!board[tr][tc]) pushMove(tr,tc);
        else { if(board[tr][tc].c!==color && board[tr][tc].t!=='c') pushMove(tr,tc); break; }
        tr+=dr; tc+=dc;
      }
    });
  }
  if(p.t==='c'){
    let kp = findKing(color);
    if(kp){
      for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
        if(dr===0&&dc===0) continue;
        if(inside(kp[0]+dr,kp[1]+dc)&&!board[kp[0]+dr][kp[1]+dc]) pushMove(kp[0]+dr,kp[1]+dc);
      }
    }
  }
  if(p.t==='k'){
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
      if(dr===0&&dc===0) continue;
      if(inside(r+dr,c+dc)&&(!board[r+dr][c+dc]||board[r+dr][c+dc].c!==color)) pushMove(r+dr,c+dc);
    }
  }
  return moves;
}

function selectPromotion(pieceType){
  if(!pendingPromotion) return;
  pendingPromotion.promotionTo = pieceType;
  applyMove(pendingPromotion);
  promoModal.style.display = 'none';
  if(turn === aiColor) setTimeout(()=>maybeAIMove(), 100);
}

function inside(r,c){return r>=0&&r<9&&c>=0&&c<9;}
function findKing(col){for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(board[r][c]&&board[r][c].t==='k'&&board[r][c].c===col)return[r,c];return null;}
function findCharioteer(col){for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(board[r][c]&&board[r][c].t==='c'&&board[r][c].c===col)return[r,c];return null;}

function snapshotState(){
  return {
    board: board.map(row => row.map(cell => cell ? {...cell} : null)),
    turn, lastMove: lastMove ? {...lastMove} : null, halfmoveClock, fullmoveNumber
  };
}
function restoreState(s){
  board = s.board.map(row=>row.map(cell=>cell?{...cell}:null));
  turn = s.turn; lastMove = s.lastMove; halfmoveClock = s.halfmoveClock; fullmoveNumber = s.fullmoveNumber;
}

function makeMoveOnBoard(m){
  const [fr,fc] = m.from, [tr,tc] = m.to; const p = board[fr][fc];
  board[tr][tc] = {...p}; board[fr][fc] = null;
  if(m.special==='promotion') board[tr][tc].t = m.promotionTo || 'q';
}

function applyMove(m) {
  const snap = snapshotState(); makeMoveOnBoard(m);
  moveHistory.push({move:m, snapshot:snap});
  lastMove = {from:m.from, to:m.to};
  turn = turn === 'w' ? 'b' : 'w';
  render();
  checkCharioteerNeeded();
  
  if (!forcingCharioteerPhase) {
    checkGameOver();
  }
}

/* ----------------------------------------------------
   ⭐ ADVANCED MULTI-DIFFICULTY AI LOGIC STARTS HERE ⭐
   ---------------------------------------------------- */

// Board Positions Evaluator
function evaluateBoard() {
  let score = 0;
  for(let r=0; r<9; r++) {
    for(let c=0; c<9; c++) {
      if(board[r][c]) {
        let val = PIECE_VALUES[board[r][c].t];
        
        // Position weights: center lines and progressive positioning
        if (board[r][c].t === 'p') {
          val += (board[r][c].c === 'b' ? r * 10 : (8 - r) * 10); 
        }

        if(board[r][c].c === 'b') score += val;
        else score -= val;
      }
    }
  }
  return score;
}

// Alpha-Beta Minimax Engine 
function minimax(depth, alpha, beta, isMaximizing) {
  if (depth === 0) return evaluateBoard();

  let allMoves = [];
  let tempTurn = isMaximizing ? 'b' : 'w';

  for(let r=0; r<9; r++) {
    for(let c=0; c<9; c++) {
      if(board[r][c] && board[r][c].c === tempTurn) {
        // Cache management trick inside simulations
        let oldTurn = turn; turn = tempTurn;
        let lm = generateLegalMovesForSquare(r, c);
        turn = oldTurn;
        allMoves.push(...lm);
      }
    }
  }

  if (allMoves.length === 0) {
    return isMaximizing ? -19000 : 19000;
  }

  if (isMaximizing) {
    let maxEval = -Infinity;
    for (let m of allMoves) {
      let snap = snapshotState();
      makeMoveOnBoard(m);
      let evalScore = minimax(depth - 1, alpha, beta, false);
      restoreState(snap);
      maxEval = Math.max(maxEval, evalScore);
      alpha = Math.max(alpha, evalScore);
      if (beta <= alpha) break;
    }
    return maxEval;
  } else {
    let minEval = Infinity;
    for (let m of allMoves) {
      let snap = snapshotState();
      makeMoveOnBoard(m);
      let evalScore = minimax(depth - 1, alpha, beta, true);
      restoreState(snap);
      minEval = Math.min(minEval, evalScore);
      beta = Math.min(beta, evalScore);
      if (beta <= alpha) break;
    }
    return minEval;
  }
}

function maybeAIMove() {
  if(!aiEnabled || turn !== aiColor || pawnChoosePhase || forcingCharioteerPhase) return;
  
  let allMoves = [];
  for(let r=0; r<9; r++) {
    for(let c=0; c<9; c++){
      if(board[r][c] && board[r][c].c === aiColor){
        let lm = generateLegalMovesForSquare(r,c);
        allMoves.push(...lm);
      }
    }
  }
  
  if(allMoves.length === 0) {
    checkGameOver();
    return;
  }

  let selectedMove = null;

  // PHASE 1: Beginner Mode -> Random Moves
  if (currentDifficulty === 'easy') {
    selectedMove = allMoves[Math.floor(Math.random() * allMoves.length)];
  } 
  
  // PHASE 2: Expert Mode -> Depth 1 Lookahead Evaluation
  else if (currentDifficulty === 'medium') {
    let bestScore = -Infinity;
    let candidates = [];
    for (let m of allMoves) {
      let snap = snapshotState();
      makeMoveOnBoard(m);
      let score = evaluateBoard();
      restoreState(snap);
      if (score > bestScore) {
        bestScore = score;
        candidates = [m];
      } else if (score === bestScore) {
        candidates.push(m);
      }
    }
    selectedMove = candidates[Math.floor(Math.random() * candidates.length)];
  } 
  
  // PHASE 3: Genius GrandMaster Mode -> Deep Alpha-Beta Minimax Engine (Depth 3)
  else if (currentDifficulty === 'hard') {
    let bestScore = -Infinity;
    let candidates = [];
    for (let m of allMoves) {
      let snap = snapshotState();
      makeMoveOnBoard(m);
      let score = minimax(2, -Infinity, Infinity, false); 
      restoreState(snap);
      if (score > bestScore) {
        bestScore = score;
        candidates = [m];
      } else if (score === bestScore) {
        candidates.push(m);
      }
    }
    selectedMove = candidates[Math.floor(Math.random() * candidates.length)];
  }

  if(selectedMove) {
    if(selectedMove.special === 'promotion') selectedMove.promotionTo = 'q';
    applyMove(selectedMove);
  }
}

/* ----------------------------------------------------
   ⭐ END OF MULTI-DIFFICULTY AI LOGIC ⭐
   ---------------------------------------------------- */

function checkGameOver() {
  let hasLegalMoves = false;
  for(let r=0; r<9; r++) {
    for(let c=0; c<9; c++) {
      if(board[r][c] && board[r][c].c === turn) {
        let moves = generateLegalMovesForSquare(r, c);
        if(moves.length > 0) {
          hasLegalMoves = true;
          break;
        }
      }
    }
    if(hasLegalMoves) break;
  }

  if(!hasLegalMoves) {
    if(isKingInCheck(turn)) {
      let winner = (turn === 'w') ? 'Black' : 'White';
      statusEl.className = "status mate";
      statusEl.textContent = "Game Over! Checkmate.";
      
      setTimeout(() => {
        alert("Congratulations! " + winner + " wins the game 🏆");
      }, 200);
    } else {
      statusEl.className = "status stale";
      statusEl.textContent = "Game Over! Stalemate (Draw).";
      setTimeout(() => {
        alert("Game Over! It's a Stalemate (Draw Match).");
      }, 200);
    }
  }
}

function undoMove(){
  if(moveHistory.length===0) return;
  const last = moveHistory.pop(); restoreState(last.snapshot);
  render();
}

function checkCharioteerNeeded(){
  ['w','b'].forEach(col=>{
    let kp = findKing(col), cp = findCharioteer(col);
    if(kp && cp && (Math.abs(kp[0]-cp[0])>1 || Math.abs(kp[1]-cp[1])>1)){
      forcingCharioteerPhase = true; kingColorNeedingC = col;
      if(aiEnabled && kingColorNeedingC === aiColor) setTimeout(()=>aiRepositionCharioteer(), 150);
    }
  });
}

function aiRepositionCharioteer(){
  let kp = findKing(aiColor); let cp = findCharioteer(aiColor);
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    let tr = kp[0]+dr, tc = kp[1]+dc;
    if(inside(tr,tc) && board[tr][tc]===null){
      board[tr][tc] = {...board[cp[0]][cp[1]]}; board[cp[0]][cp[1]] = null;
      forcingCharioteerPhase = false; kingColorNeedingC = null; render();
      return;
    }
  }
}

function isKingInCheck(col){
  let kp = findKing(col); if(!kp) return true;
  let opp = col === 'w' ? 'b' : 'w';
  for(let r=0;r<9;r++) for(let c=0;c<9;c++) {
    if(board[r][c] && board[r][c].c === opp){
      let psm = generatePseudoMoves(r,c);
      if(psm.some(m=>m.to[0]===kp[0]&&m.to[1]===kp[1])) return true;
    }
  }
  return false;
}

function setStatusBar(){
  if(forcingCharioteerPhase) statusEl.textContent = "Charioteer Alert! Secure King Adjacency.";
  else if(isKingInCheck('w')) statusEl.textContent = "White King is in CHECK!";
  else if(isKingInCheck('b')) statusEl.textContent = "Black King is in CHECK!";
  else statusEl.textContent = "";
}

function startGame(){ board = initialBoard(); render(); }
